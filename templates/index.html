<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Go Hello</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        line-height: 1.5;
        color: #1a1a1a;
        padding: 0 1rem;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        background: #fafafa;
      }
      .version {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>{{ .Message }}</h1>
    <div class="card">
      <p class="version">Application Version: {{ .Version }}</p>
      <h2>Team Authors</h2>
      <ul>
        {{ range .Authors }}
        <li>{{ . }}</li>
        {{ end }}
      </ul>
      <h2>Random Joke</h2>
      <p>{{ .Joke }}</p>
    </div>
  </body>
</html>
